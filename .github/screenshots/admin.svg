<svg viewBox="0 0 320 580" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <rect width="320" height="580" rx="32" fill="#1A1A2E"/>
  <rect x="8" y="8" width="304" height="564" rx="26" fill="#F2F2F2"/>

  <!-- Status bar -->
  <rect x="8" y="8" width="304" height="40" rx="26" fill="#111827"/>
  <rect x="8" y="34" width="304" height="14" fill="#111827"/>
  <text x="30" y="30" fill="white" font-size="11" font-weight="600">9:41</text>
  <text x="255" y="30" fill="white" font-size="10">●●●</text>

  <!-- Header -->
  <rect x="8" y="48" width="304" height="60" fill="#111827"/>
  <text x="28" y="74" fill="white" font-size="15" font-weight="700">🔧 Администратор</text>
  <text x="28" y="94" fill="#6B7280" font-size="11">Управление документами</text>

  <!-- Body -->
  <rect x="8" y="108" width="304" height="464" fill="#F2F2F2"/>

  <!-- Upload button -->
  <rect x="20" y="120" width="280" height="48" rx="14" fill="#111827"/>
  <text x="160" y="149" fill="white" font-size="13" font-weight="700" text-anchor="middle">+ Загрузить документ</text>

  <text x="28" y="194" fill="#333" font-size="12" font-weight="600">Все документы</text>

  <!-- Doc 1 - ready -->
  <rect x="20" y="204" width="280" height="85" rx="14" fill="white" filter="drop-shadow(0 1px 6px rgba(0,0,0,0.07))"/>
  <text x="36" y="225" fill="#111" font-size="13" font-weight="600">Протокол сепсиса v2.1.pdf</text>
  <rect x="36" y="234" width="95" height="18" rx="9" fill="#E8F5E9"/>
  <text x="84" y="247" fill="#1E8C45" font-size="10" font-weight="700" text-anchor="middle">✓ scenarios_ready</text>
  <text x="36" y="268" fill="#888" font-size="11">116 сценариев  ·  Загружен 14.04.2025</text>
  <rect x="36" y="275" width="180" height="5" rx="2.5" fill="#E8EDFB"/>
  <rect x="36" y="275" width="180" height="5" rx="2.5" fill="#1A3ED4"/>
  <text x="282" y="232" fill="#CCC" font-size="14" text-anchor="middle">⋮</text>

  <!-- Doc 2 - generating -->
  <rect x="20" y="302" width="280" height="85" rx="14" fill="white" filter="drop-shadow(0 1px 6px rgba(0,0,0,0.07))"/>
  <text x="36" y="323" fill="#111" font-size="13" font-weight="600">СОП инфузионная терапия.docx</text>
  <rect x="36" y="332" width="80" height="18" rx="9" fill="#FFF3E0"/>
  <text x="76" y="345" fill="#F5820D" font-size="10" font-weight="700" text-anchor="middle">⚙ generating</text>
  <text x="36" y="366" fill="#888" font-size="11">Загружен сегодня</text>
  <!-- Progress bar animated look -->
  <rect x="36" y="373" width="180" height="5" rx="2.5" fill="#FFF3E0"/>
  <rect x="36" y="373" width="67" height="5" rx="2.5" fill="#F5820D"/>
  <text x="222" y="378" fill="#F5820D" font-size="10" font-weight="600">37%</text>

  <!-- Doc 3 - indexed -->
  <rect x="20" y="400" width="280" height="85" rx="14" fill="white" filter="drop-shadow(0 1px 6px rgba(0,0,0,0.07))"/>
  <text x="36" y="421" fill="#111" font-size="13" font-weight="600">Хирургический чеклист.pdf</text>
  <rect x="36" y="430" width="60" height="18" rx="9" fill="#E8EDFB"/>
  <text x="66" y="443" fill="#1A3ED4" font-size="10" font-weight="700" text-anchor="middle">indexed</text>
  <text x="36" y="464" fill="#888" font-size="11">0 сценариев  ·  Загружен 10.04.2025</text>
  <rect x="150" y="456" width="130" height="24" rx="12" fill="#1A3ED4"/>
  <text x="215" y="472" fill="white" font-size="11" font-weight="600" text-anchor="middle">Генерировать ИИ</text>

  <!-- Drag hint -->
  <rect x="20" y="498" width="280" height="40" rx="12" fill="white" stroke="#E8EDFB" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="160" y="522" fill="#AAA" font-size="12" text-anchor="middle">Перетащите файл PDF / DOCX / TXT</text>

  <!-- Bottom nav -->
  <rect x="8" y="548" width="304" height="24" rx="0" fill="white"/>
  <rect x="8" y="563" width="304" height="9" rx="26" fill="white"/>
  <rect x="8" y="548" width="304" height="1" fill="#EEE"/>
  <text x="92" y="563" fill="#AAA" font-size="10" text-anchor="middle">📚 Тренировки</text>
  <text x="228" y="563" fill="#111827" font-size="10" font-weight="700" text-anchor="middle">🔧 Панель</text>
</svg>
