<svg viewBox="0 0 320 580" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <rect width="320" height="580" rx="32" fill="#1A1A2E"/>
  <rect x="8" y="8" width="304" height="564" rx="26" fill="#F2F2F2"/>

  <!-- Status bar -->
  <rect x="8" y="8" width="304" height="40" rx="26" fill="#1A3ED4"/>
  <rect x="8" y="34" width="304" height="14" fill="#1A3ED4"/>
  <text x="30" y="30" fill="white" font-size="11" font-weight="600">9:41</text>
  <text x="255" y="30" fill="white" font-size="10">●●●</text>

  <!-- Hero section -->
  <rect x="8" y="48" width="304" height="180" fill="#1A3ED4"/>
  <!-- Trophy icon area -->
  <text x="160" y="115" font-size="50" text-anchor="middle">🏆</text>
  <text x="160" y="150" fill="white" font-size="18" font-weight="800" text-anchor="middle">87 / 100</text>
  <text x="160" y="172" fill="#B3C4F7" font-size="12" text-anchor="middle">Протокол сепсиса v2.1</text>
  <text x="160" y="190" fill="#B3C4F7" font-size="11" text-anchor="middle">Пройдено за 14 мин 32 сек</text>
  <text x="160" y="218" fill="#1A3ED4" font-size="11" text-anchor="middle">.</text>

  <!-- Body -->
  <rect x="8" y="210" width="304" height="362" fill="#F2F2F2"/>

  <!-- Score ring visual -->
  <rect x="20" y="224" width="280" height="80" rx="16" fill="white" filter="drop-shadow(0 2px 8px rgba(0,0,0,0.06))"/>
  <!-- Progress bar -->
  <text x="36" y="248" fill="#333" font-size="12" font-weight="600">Общий результат</text>
  <text x="268" y="248" fill="#1A3ED4" font-size="14" font-weight="800" text-anchor="end">87%</text>
  <rect x="36" y="258" width="248" height="10" rx="5" fill="#E8EDFB"/>
  <rect x="36" y="258" width="216" height="10" rx="5" fill="#1A3ED4"/>

  <!-- Stats row -->
  <text x="36" y="288" fill="#1E8C45" font-size="12">✅ Верно</text>
  <text x="130" y="288" fill="#1E8C45" font-size="13" font-weight="700">10 / 12</text>
  <text x="196" y="288" fill="#D93025" font-size="12">❌ Ошибки</text>
  <text x="268" y="288" fill="#D93025" font-size="13" font-weight="700" text-anchor="end">2 / 12</text>

  <!-- Per type breakdown -->
  <rect x="20" y="316" width="280" height="100" rx="16" fill="white" filter="drop-shadow(0 2px 8px rgba(0,0,0,0.06))"/>
  <text x="36" y="338" fill="#333" font-size="12" font-weight="600">По типам заданий</text>

  <text x="36" y="362" fill="#444" font-size="11">Выбор ответа</text>
  <rect x="130" y="352" width="120" height="8" rx="4" fill="#E8EDFB"/>
  <rect x="130" y="352" width="120" height="8" rx="4" fill="#1A3ED4"/>
  <text x="268" y="362" fill="#1A3ED4" font-size="11" font-weight="700" text-anchor="end">6/6</text>

  <text x="36" y="386" fill="#444" font-size="11">Алгоритмы</text>
  <rect x="130" y="376" width="120" height="8" rx="4" fill="#E8EDFB"/>
  <rect x="130" y="376" width="90" height="8" rx="4" fill="#1A3ED4"/>
  <text x="268" y="386" fill="#1A3ED4" font-size="11" font-weight="700" text-anchor="end">3/4</text>

  <text x="36" y="410" fill="#444" font-size="11">Свободный ответ</text>
  <rect x="130" y="400" width="120" height="8" rx="4" fill="#E8EDFB"/>
  <rect x="130" y="400" width="54" height="8" rx="4" fill="#1A3ED4"/>
  <text x="268" y="410" fill="#1A3ED4" font-size="11" font-weight="700" text-anchor="end">1/2</text>

  <!-- Buttons -->
  <rect x="20" y="430" width="280" height="46" rx="14" fill="#1A3ED4"/>
  <text x="160" y="458" fill="white" font-size="13" font-weight="700" text-anchor="middle">💬 Разобрать ошибки</text>

  <rect x="20" y="488" width="280" height="46" rx="14" fill="white" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="160" y="516" fill="#333" font-size="13" font-weight="600" text-anchor="middle">🔄 Пройти снова</text>

  <text x="160" y="552" fill="#1A3ED4" font-size="12" font-weight="600" text-anchor="middle">← Вернуться к тренировкам</text>
</svg>
