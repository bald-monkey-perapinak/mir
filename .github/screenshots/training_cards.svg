<svg viewBox="0 0 320 580" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <rect width="320" height="580" rx="32" fill="#1A1A2E"/>
  <rect x="8" y="8" width="304" height="564" rx="26" fill="#F2F2F2"/>

  <!-- Status bar -->
  <rect x="8" y="8" width="304" height="40" rx="26" fill="#1A3ED4"/>
  <rect x="8" y="34" width="304" height="14" fill="#1A3ED4"/>
  <text x="30" y="30" fill="white" font-size="11" font-weight="600">9:41</text>
  <text x="255" y="30" fill="white" font-size="10">●●●</text>

  <!-- Header -->
  <rect x="8" y="48" width="304" height="60" fill="#1A3ED4"/>
  <text x="44" y="74" fill="white" font-size="14" font-weight="700">Протокол сепсиса</text>
  <text x="44" y="92" fill="#B3C4F7" font-size="11">Задание 3 из 12</text>
  <text x="28" y="78" fill="white" font-size="16">←</text>

  <!-- Progress bar -->
  <rect x="8" y="108" width="304" height="6" fill="#E8EDFB"/>
  <rect x="8" y="108" width="76" height="6" fill="#1A3ED4"/>

  <!-- Body -->
  <rect x="8" y="114" width="304" height="458" fill="#F2F2F2"/>

  <!-- Question card -->
  <rect x="20" y="130" width="280" height="130" rx="16" fill="white" filter="drop-shadow(0 2px 8px rgba(0,0,0,0.08))"/>
  <rect x="20" y="130" width="280" height="6" rx="3" fill="#1A3ED4"/>
  <text x="32" y="158" fill="#1A3ED4" font-size="10" font-weight="700" letter-spacing="1">КЛИНИЧЕСКИЙ СЛУЧАЙ</text>
  <text x="32" y="180" fill="#111" font-size="13">Пациент 68 лет, t° 38.9°C,</text>
  <text x="32" y="198" fill="#111" font-size="13">ЧСС 112, АД 95/60 мм рт.ст.</text>
  <text x="32" y="216" fill="#111" font-size="13">Подозрение на сепсис.</text>
  <text x="32" y="238" fill="#444" font-size="13" font-weight="600">Ваш первый шаг?</text>

  <!-- Options -->
  <rect x="20" y="272" width="280" height="50" rx="12" fill="white" filter="drop-shadow(0 1px 4px rgba(0,0,0,0.06))"/>
  <rect x="20" y="272" width="4" height="50" rx="2" fill="#DDD"/>
  <text x="44" y="293" fill="#666" font-size="11" font-weight="700">A</text>
  <text x="60" y="293" fill="#111" font-size="13">Немедленно ввести антибиотик</text>
  <text x="60" y="309" fill="#888" font-size="11">без культуры крови</text>

  <!-- Correct option highlighted -->
  <rect x="20" y="334" width="280" height="50" rx="12" fill="#E8EDFB" filter="drop-shadow(0 1px 4px rgba(26,62,212,0.15))"/>
  <rect x="20" y="334" width="4" height="50" rx="2" fill="#1A3ED4"/>
  <text x="44" y="355" fill="#1A3ED4" font-size="11" font-weight="700">B</text>
  <text x="60" y="355" fill="#1A3ED4" font-size="13" font-weight="600">Болюс 30 мл/кг 0.9% NaCl</text>
  <text x="60" y="371" fill="#1A3ED4" font-size="11">за первые 3 часа</text>
  <circle cx="285" cy="359" r="10" fill="#1A3ED4"/>
  <text x="285" y="363" fill="white" font-size="12" text-anchor="middle" font-weight="700">✓</text>

  <rect x="20" y="396" width="280" height="50" rx="12" fill="white" filter="drop-shadow(0 1px 4px rgba(0,0,0,0.06))"/>
  <rect x="20" y="396" width="4" height="50" rx="2" fill="#DDD"/>
  <text x="44" y="417" fill="#666" font-size="11" font-weight="700">C</text>
  <text x="60" y="417" fill="#111" font-size="13">КТ органов грудной клетки</text>
  <text x="60" y="433" fill="#888" font-size="11">для поиска очага</text>

  <rect x="20" y="458" width="280" height="50" rx="12" fill="white" filter="drop-shadow(0 1px 4px rgba(0,0,0,0.06))"/>
  <rect x="20" y="458" width="4" height="50" rx="2" fill="#DDD"/>
  <text x="44" y="479" fill="#666" font-size="11" font-weight="700">D</text>
  <text x="60" y="479" fill="#111" font-size="13">Взять гемокультуру × 2</text>
  <text x="60" y="495" fill="#888" font-size="11">и ожидать результатов</text>

  <!-- Submit button -->
  <rect x="20" y="522" width="280" height="46" rx="14" fill="#1A3ED4"/>
  <text x="160" y="550" fill="white" font-size="14" font-weight="700" text-anchor="middle">Ответить</text>
</svg>
